apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: internal-developer-platform
  title: Internal Developer Platform
  description: |
    Platform-as-product system for AWS infrastructure delivery with Backstage,
    reusable Terraform modules, operational guardrails, and self-service workflows.
  tags:
    - platform
    - backstage
    - aws
    - idp
spec:
  owner: platform-team
  domain: platform

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: platform-product-foundation
  title: Platform Product Foundation
  description: Root repository for the Backstage-integrated platform product
  tags:
    - terraform
    - backstage
    - platform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-networking
  title: Networking Module
  description: VPC, subnets, and security groups shared by the platform products
  tags:
    - networking
    - vpc
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/platform-product-foundation

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-jenkins-module
  title: Jenkins EC2 Module
  description: Terraform module for provisioning the Jenkins platform track on EC2
  tags:
    - jenkins
    - compute
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-networking
    - component:default/terraform-security-groups

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-security-groups
  title: Security Groups Module
  description: Security group configurations for Jenkins and supporting services
  tags:
    - security
    - networking
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-networking

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-load-balancer
  title: Load Balancer Module
  description: Application Load Balancer configuration for Jenkins
  tags:
    - load-balancer
    - networking
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-networking

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-certificates
  title: SSL/TLS Certificates Module
  description: AWS Certificate Manager configuration for HTTPS
  tags:
    - security
    - ssl
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: terraform-dns
  title: DNS Configuration Module
  description: Route 53 DNS and domain configuration for platform products
  tags:
    - dns
    - route53
    - terraform
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-certificates

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ansible-jenkins-setup
  title: Ansible Jenkins Configuration
  description: Ansible playbooks for Jenkins EC2 configuration
  tags:
    - ansible
    - configuration-management
    - jenkins
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-jenkins-module

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-ecs-runtime-product
  title: Customer ECS Runtime Product
  description: Self-service ECS runtime product exposed through Backstage scaffolder templates
  tags:
    - ecs
    - runtime
    - scaffolder
    - terraform
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
  dependsOn:
    - component:default/terraform-networking

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: platform-self-service-api
  title: Platform Self-Service API
  description: Logical API surface for Backstage-driven platform provisioning flows
  tags:
    - backstage
    - scaffolder
    - platform
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: terraform-state-backend
  title: Terraform State Backend API
  description: S3 backend for Terraform state management
  tags:
    - api
    - terraform
    - state-management
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: internal-developer-platform
