$schema: https://backstage.io/schema/kinds/Template
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-ec2-instance
  title: Create EC2 Instance
  description: Provision a standard EC2 instance with platform guardrails
  tags:
    - aws
    - ec2
    - compute
    - terraform
    - self-service
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Instance details
      required:
        - name
        - environment
        - ami_id
        - subnet_id
        - owner
      properties:
        name:
          title: Instance Name
          type: string
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - qa
            - prod
        ami_id:
          title: AMI ID
          type: string
          description: AWS AMI ID (e.g. ami-0c55b159cbfafe1f0)
        instance_type:
          title: Instance Type
          type: string
          default: t3.micro
        subnet_id:
          title: Subnet ID
          type: string
        security_group_ids:
          title: Security Group IDs
          type: array
          items:
            type: string
          default: []
        key_name:
          title: SSH Key Name
          type: string

    - title: Ownership
      required:
        - aws_region
        - owner
        - project
      properties:
        aws_region:
          title: AWS Region
          type: string
          default: eu-north-1
        owner:
          title: Owner Email
          type: string
        project:
          title: Project Name
          type: string
        cost_center:
          title: Cost Center
          type: string
          default: "platform-ops"

    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Target Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            requestUserCredentials:
              secretsKey: USER_OAUTH_TOKEN

  steps:
    - id: fetch-base
      name: Fetch EC2 template
      action: fetch:template
      input:
        url: ./ec2-instance
        targetPath: ./
        values:
          name: ${{ parameters.name }}
          environment: ${{ parameters.environment }}
          ami_id: ${{ parameters.ami_id }}
          instance_type: ${{ parameters.instance_type }}
          subnet_id: ${{ parameters.subnet_id }}
          security_group_ids: ${{ parameters.security_group_ids }}
          key_name: ${{ parameters.key_name }}
          aws_region: ${{ parameters.aws_region }}
          owner: ${{ parameters.owner }}
          project: ${{ parameters.project }}
          cost_center: ${{ parameters.cost_center }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        token: ${{ secrets.USER_OAUTH_TOKEN }}
        defaultBranch: main
        description: EC2 instance definition for ${{ parameters.name }}.

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Catalog Entry
        url: https://your-backstage-instance/catalog/default/component/${{ parameters.name }}
