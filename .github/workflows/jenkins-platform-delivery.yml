name: Jenkins Platform Delivery

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-platform-delivery-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.6.0

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/jenkins-platform-delivery.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/jenkins-platform-delivery.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      action:
        description: Delivery action
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

jobs:
  quality-gate:
    name: Quality Gate & Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            aws_region: eu-north-1
            aws_account_id: "111111111111"
          - environment: qa
            aws_region: eu-north-1
            aws_account_id: "222222222222"
          - environment: prod
            aws_region: eu-north-1
            aws_account_id: "333333333333"
    if: github.event_name != 'workflow_dispatch' || (inputs.action == 'plan' && matrix.environment == inputs.environment)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.aws_region }}

      - name: Terraform init
        run: terraform init -backend-config=backend-config-${{ matrix.environment }}.hcl

      - name: Terraform plan
        run: terraform plan -var-file=terraform.${{ matrix.environment }}.tfvars -out=tfplan-${{ matrix.environment }}

      - name: Terraform show (JSON)
        run: terraform show -json tfplan-${{ matrix.environment }} > tfplan-${{ matrix.environment }}.json

      - name: Setup Conftest
        uses: open-policy-agent/conftest-action@v1

      - name: Run OPA Policy Check (Conftest)
        run: conftest test tfplan-${{ matrix.environment }}.json --policy policies/terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: tfplan-${{ matrix.environment }}

  apply:
    name: Apply ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            aws_region: eu-north-1
            aws_account_id: "111111111111"
          - environment: qa
            aws_region: eu-north-1
            aws_account_id: "222222222222"
          - environment: prod
            aws_region: eu-north-1
            aws_account_id: "333333333333"
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && matrix.environment == inputs.environment
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.aws_region }}

      - name: Terraform init
        run: terraform init -backend-config=backend-config-${{ matrix.environment }}.hcl

      - name: Terraform plan
        run: terraform plan -var-file=terraform.${{ matrix.environment }}.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
