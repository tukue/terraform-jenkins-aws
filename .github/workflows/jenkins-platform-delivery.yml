name: Jenkins Platform Delivery

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-platform-delivery-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.11.2

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/jenkins-platform-delivery.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/jenkins-platform-delivery.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  quality-gate:
    name: Quality Gate & Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Download tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 -O /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --exclude-downloaded-modules

  plan-selected:
    name: Plan ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Terraform init
        run: terraform init -backend-config=backend-config-${{ inputs.environment }}.hcl

      - name: Terraform plan
        run: terraform plan -var-file=terraform.${{ inputs.environment }}.tfvars -out=tfplan-${{ inputs.environment }}

      - name: Terraform show (JSON)
        run: terraform show -json tfplan-${{ inputs.environment }} > tfplan-${{ inputs.environment }}.json

      - name: Setup Conftest
        uses: open-policy-agent/conftest-action@v1

      - name: Run OPA Policy Check (Conftest)
        run: conftest test tfplan-${{ inputs.environment }}.json --policy policies/terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: |
            tfplan-${{ inputs.environment }}
            tfplan-${{ inputs.environment }}.json
          retention-days: 7
