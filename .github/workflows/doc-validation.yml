name: Documentation Validation

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: doc-validation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'docs/**'
      - '**.md'
      - '**.mdx'
      - '.github/workflows/doc-validation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '**.md'
      - '**.mdx'
      - '.github/workflows/doc-validation.yml'
  workflow_dispatch:

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

  link-check:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude-mail
            --exclude 'https?://localhost*'
            --exclude 'https?://127\.0\.0\.1*'
            --exclude 'https?://10\.*'
            --exclude 'https?://192\.168\.*'
            --exclude 'https?://.*\.internal.*'
            --exclude 'https://github.com/tukue/terraform-jenkins-aws/*'
            './**/*.md'
            './**/*.mdx'
            '!./.git/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
