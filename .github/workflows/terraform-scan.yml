name: Terraform Security Scan

permissions:
  contents: read
  security-events: write

concurrency:
  group: terraform-security-scan-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    name: Terraform Security and Policy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 -O /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --exclude-downloaded-modules

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0

      - name: Test policy as code
        run: opa test policies/terraform --verbose
