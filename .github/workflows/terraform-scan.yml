name: Terraform Security Scan

permissions:
  contents: read
  security-events: write

concurrency:
  group: terraform-security-scan-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    name: Terraform Security and Policy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 -O /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --exclude-downloaded-modules

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2

      - name: Test policy as code
        run: opa test policies/terraform --verbose
