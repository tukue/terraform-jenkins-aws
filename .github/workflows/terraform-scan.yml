name: Terraform Security Scan

permissions:
  contents: read

concurrency:
  group: terraform-security-scan-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform 1.11.2
        run: |
          wget -q https://releases.hashicorp.com/terraform/1.11.2/terraform_1.11.2_linux_amd64.zip
          unzip -q terraform_1.11.2_linux_amd64.zip
          rm -f terraform_1.11.2_linux_amd64.zip
          chmod +x terraform
          sudo mv terraform /usr/local/bin/

      - name: Terraform version
        run: terraform --version

      - name: Terraform init
        run: terraform init -backend=false

      - name: Download tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 -O /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --exclude-downloaded-modules
