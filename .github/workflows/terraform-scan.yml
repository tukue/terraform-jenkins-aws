name: Terraform Security Scan

permissions:
  contents: read

concurrency:
  group: terraform-security-scan-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TF_SIGNOMSKIP: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.2
          terraform_wrapper: false

      - name: Debug terraform version
        run: terraform --version

      - name: Terraform init
        run: terraform init -backend=false

      - name: Download tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 -O /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec
        run: tfsec . --exclude-downloaded-modules
