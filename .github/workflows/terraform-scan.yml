name: Terraform Security Scan

permissions:
  contents: read

on:
  push:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - 'backend-config-*.hcl'
      - '.github/workflows/terraform-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
          additional_args: --exclude-downloaded-modules
